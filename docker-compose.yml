services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance_secret
      POSTGRES_DB: finance_tracker
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d finance_tracker"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://finance:finance_secret@postgres:5432/finance_tracker?sslmode=disable
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: finance
      DB_PASSWORD: finance_secret
      DB_NAME: finance_tracker
      DB_SSLMODE: disable
      JWT_SECRET: change-me-to-a-random-secret
      OLLAMA_URL: http://host.docker.internal:11434
      SERVER_PORT: 8080
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: changeme123
      GMAIL_POLL_INTERVAL: 15m
      GMAIL_QUERY: "from:(alerts@pnc.com OR no.reply.alerts@chase.com OR alert@chase.com)"
    volumes:
      - ./backend/credentials.json:/app/credentials.json:ro
      - ./backend/token.json:/app/token.json

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8080/api/v1
    ports:
      - "3000:3000"
    depends_on:
      - api
    restart: unless-stopped

volumes:
  pgdata:
